<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="blog_post_card.css" />
  </head>
  <body>
    <div class="blog-post-card">
      <img
        class="post-img"
        src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
        alt="a man typing on a laptop in a cybercafe"
      />
      <div class="post-content">
        <h2 class="post-title">Learn Web Development in 2026</h2>
        <p class="post-excerpt">
          Stay ahead of the curve with the latest trends in web development.
          Discover what's new and exciting in 2024
        </p>
        <p class="read-more"><button>Read More</button></p>
      </div>
    </div>
  </body>
</html>
