<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
  </head>
  <body>
    <h1 id="title">Survey Form</h1>
    <p id="description">Please fill out this short survey form.</p>

    <form id="survey-form">
      <label id="name-label" for="name">Name</label>
      <input id="name" type="text" placeholder="Enter your name" required />

      <label id="email-label" for="email">Email</label>
      <input id="email" type="email" placeholder="Enter your email" required />

      <label id="number-label" for="number">Age</label>
      <input
        id="number"
        type="number"
        min="10"
        max="100"
        placeholder="Enter your age"
      />

      <label for="dropdown">Which option best describes you?</label>
      <select id="dropdown">
        <option value="">Select an option</option>
        <option value="student">Student</option>
        <option value="developer">Developer</option>
      </select>

      <p>Would you recommend us?</p>
      <label>
        <input type="radio" name="recommend" value="yes" />
        Yes
      </label>
      <label>
        <input type="radio" name="recommend" value="no" />
        No
      </label>

      <p>What would you like to improve?</p>
      <label>
        <input type="checkbox" value="frontend" />
        Frontend
      </label>
      <label>
        <input type="checkbox" value="backend" />
        Backend
      </label>
      <label>
        <input type="checkbox" value="ui" />
        UI/UX
      </label>

      <p>Additional Comments</p>
      <textarea placeholder="Enter your comments here"></textarea>

      <br /><button id="submit" type="submit">Submit</button>
    </form>
  </body>
</html>
