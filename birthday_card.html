<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Greeting Card</title>
    <link rel="stylesheet" href="birthday_card.css" />
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Happy Birthday! Saif</h1>
        <p>Wishing you all the happiness and joy on your special day!</p>
        <a href="#send">Send Card</a>
        <a href="#share">Share on Social Media</a>
      </div>
      <section id="send">
        <h2>Send Your Card....</h2>
        <p>Card successfully sent to your recipient!</p>
      </section>
      <section id="share">
        <h2>Sharing Your Card....</h2>
        <p>Share your birthday wishes with friends and family!</p>
      </section>
    </main>
  </body>
</html>
