<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feature Selection</title>
    <link rel="stylesheet" href="feature_selection.css" />
  </head>
  <body>
    <div class="feature-card-container">
      <h1>Feature Selection</h1>
      <label class="feature-card" for="cloud"
        ><h3>Cloud Storage</h3>
        <p>100 Gigabyte secure storage</p>
        <input type="checkbox" id="cloud" />
      </label>
      <label class="feature-card" for="support"
        ><h3>Customer Support</h3>
        <p>24/7 customer help</p>
        <input type="checkbox" id="support" />
      </label>
      <label class="feature-card" for="analytics"
        ><h3>Analytics</h3>
        <p>Advanced data analysis tools</p>
        <input type="checkbox" id="analytics" />
      </label>
      <label class="feature-card" for="theme"
        ><h3>Theme Customization</h3>
        <p>Customize the look and feel of your application</p>
        <input type="checkbox" id="theme" />
      </label>
      <label class="feature-card" for="collab"
        ><h3>Cloud Collaboration</h3>
        <p>Work together with your team in real-time</p>
        <input type="checkbox" id="collab" />
      </label>
      <label class="feature-card" for="api"
        ><h3>API Integration</h3>
        <p>Seamlessly integrate with third-party services</p>
        <input type="checkbox" id="api" />
      </label>
    </div>
  </body>
</html>
