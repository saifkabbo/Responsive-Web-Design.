<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main id="playing-cards">
      <div class="card">
        <div class="left">A<br />♠</div>
        <div class="middle">♠</div>
        <div class="right">♠<br />A</div>
      </div>
      <div class="card">
        <div class="left">2<br />♣</div>
        <div class="middle">♣♣</div>
        <div class="right">♣<br />2</div>
      </div>
      <div class="card">
        <div class="left red">3<br />♥</div>
        <div class="middle red">♥♥♥</div>
        <div class="right red">♥<br />3</div>
      </div>
      <div class="card">
        <div class="left">4<br />♣</div>
        <div class="middle">♣♣♣♣</div>
        <div class="right">♣<br />4</div>
      </div>
      <div class="card">
        <div class="left red">5<br />♦</div>
        <div class="middle red">♦♦♦♦♦</div>
        <div class="right red">♦<br />5</div>
      </div>
    </main>
  </body>
</html>
