<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <link rel="stylesheet" href="contact_form.css" />
  </head>
  <body>
    <div class="form-container">
      <form action="#" method="post">
        <h1>Contact Us</h1>
        <label for="name">
          Name:
          <input type="text" id="name" required placeholder="Saif" />
        </label>
        <label for="email">
          Email:
          <input
            type="email"
            id="email"
            required
            placeholder="Saif@example.com"
          />
        </label>
        <label for="message">
          Message:
          <textarea
            name="message"
            value="message"
            id="message"
            required
            placeholder="Write your message here!"
            rows="5"
            cols="40"
          ></textarea>
        </label>
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
>
